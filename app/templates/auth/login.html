{% extends 'base.html' %}

{% block title %}Login - Open Kitchen{% endblock %}

{% block content %}
<style>
    .auth-card {
        background-color: var(--cream);
        border: 3px solid var(--border-dark);
        border-radius: 30px;
        padding: 3rem 2rem;
        box-shadow: 10px 10px 0px var(--border-dark);
    }

    .auth-title {
        font-family: 'Georgia', serif;
        text-transform: uppercase;
        font-weight: bold;
        font-size: 2rem;
        letter-spacing: 2px;
        color: var(--border-dark);
    }

    .form-label {
        text-transform: uppercase;
        font-size: 0.75rem;
        font-weight: bold;
        letter-spacing: 1px;
        margin-bottom: 0.5rem;
        display: block;
    }

    .auth-input {
        width: 100%;
        padding: 12px;
        border-radius: 12px;
        border: 2px solid var(--border-dark);
        background-color: white;
        font-family: inherit;
        transition: border-color 0.2s;
    }

    .auth-input:focus {
        outline: none;
        border-color: var(--pill-green);
    }

    .auth-footer-text {
        font-size: 0.85rem;
        color: var(--border-dark);
        opacity: 0.8;
    }

    .auth-footer-text a {
        color: var(--forest-green);
        font-weight: bold;
        text-decoration: underline;
    }
</style>

<div class="columns is-centered mt-6">
    <div class="column is-10-mobile is-8-tablet is-6-desktop is-5-widescreen">
        <div class="auth-card">
            <h2 class="auth-title has-text-centered mb-5">Login</h2>
            
            <form method="post">
                <input type="hidden" name="template_type" value="login">

                <div class="field mb-4">
                    <label class="form-label" for="username">Username</label>
                    <div class="control">
                        <input class="auth-input" type="text" name="username" id="username" placeholder="Your username" required>
                    </div>
                </div>

                <div class="field mb-5">
                    <label class="form-label" for="password">Password</label>
                    <div class="control">
                        <input class="auth-input" type="password" name="password" id="password" placeholder="Your password" required>
                    </div>
                </div>

                <div class="field">
                    <div class="control">
                        <button type="submit" class="btn-pill" style="width: 100%; padding: 15px 0; cursor: pointer;">
                            Enter Kitchen
                        </button>
                    </div>
                </div>
            </form>

            <div class="has-text-centered mt-5">
                <p class="auth-footer-text">
                    Don't have an account? <br>
                    <a href="{{ url_for('auth.register') }}">Register for an invite</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
