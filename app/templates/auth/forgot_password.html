{% extends 'base.html' %}

{% block title %}Forgot Password - Open Kitchen{% endblock %}

{% block content %}
<div class="columns is-centered">
    <div class="column is-5-desktop is-8-tablet">
        <div class="auth-card" style="background-color: var(--cream); border: 3px solid var(--border-dark); border-radius: 30px; padding: 3rem; margin-top: 3rem;">
            <h2 style="font-family: 'Georgia', serif; text-transform: uppercase; font-weight: bold; text-align: center; margin-bottom: 1rem;">Forgot Password</h2>
            <p style="text-align: center; margin-bottom: 2rem;">Enter your email address and we'll send you a 6-digit reset code.</p>
            
            <form method="post">
                <div class="field" style="margin-bottom: 1.5rem;">
                    <label class="label" for="email" style="font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px;">Email Address</label>
                    <div class="control">
                        <input class="input" type="email" name="email" id="email" required style="border: 2px solid var(--border-dark); border-radius: 15px; padding: 10px;">
                    </div>
                </div>
                
                <div class="field mt-5">
                    <div class="control has-text-centered">
                        <button type="submit" class="btn-pill" style="width: 100%; cursor: pointer;">Send Code</button>
                    </div>
                </div>
            </form>
            
            <div class="has-text-centered mt-4">
                <a href="{{ url_for('auth.login') }}" style="color: var(--forest-green); font-weight: bold; font-size: 0.9rem;">Back to Login</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
