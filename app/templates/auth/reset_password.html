{% extends 'base.html' %}

{% block title %}Reset Password - Open Kitchen{% endblock %}

{% block content %}
<div class="columns is-centered">
    <div class="column is-5-desktop is-8-tablet">
        <div class="auth-card" style="background-color: var(--cream); border: 3px solid var(--border-dark); border-radius: 30px; padding: 3rem; margin-top: 3rem;">
            <h2 style="font-family: 'Georgia', serif; text-transform: uppercase; font-weight: bold; text-align: center; margin-bottom: 2rem;">Reset Password</h2>
            
            <form method="post">
                <div class="field" style="margin-bottom: 1.5rem;">
                    <label class="label" for="email" style="font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px;">Email Address</label>
                    <div class="control">
                        <input class="input" type="email" name="email" id="email" value="{{ email }}" required readonly style="border: 2px solid var(--border-dark); border-radius: 15px; padding: 10px; background-color: #f5f5f5;">
                    </div>
                </div>
                
                <div class="field" style="margin-bottom: 1.5rem;">
                    <label class="label" for="code" style="font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px;">6-Digit Reset Code</label>
                    <div class="control">
                        <input class="input" type="text" name="code" id="code" maxlength="6" pattern="\d{6}" placeholder="123456" required style="border: 2px solid var(--border-dark); border-radius: 15px; padding: 10px; letter-spacing: 3px; font-weight: bold;">
                    </div>
                </div>
                
                <div class="field" style="margin-bottom: 1.5rem;">
                    <label class="label" for="password" style="font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px;">New Password</label>
                    <div class="control">
                        <input class="input" type="password" name="password" id="password" required style="border: 2px solid var(--border-dark); border-radius: 15px; padding: 10px;">
                    </div>
                </div>
                
                <div class="field" style="margin-bottom: 1.5rem;">
                    <label class="label" for="confirm_password" style="font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px;">Confirm New Password</label>
                    <div class="control">
                        <input class="input" type="password" name="confirm_password" id="confirm_password" required style="border: 2px solid var(--border-dark); border-radius: 15px; padding: 10px;">
                    </div>
                </div>
                
                <div class="field mt-5">
                    <div class="control has-text-centered">
                        <button type="submit" class="btn-pill" style="width: 100%; cursor: pointer;">Update Password</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
