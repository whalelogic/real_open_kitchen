{% extends 'base.html' %}

{% block title %}Reset Password - Open Kitchen{% endblock %}

{% block content %}
<div class="columns is-centered">
    <div class="column is-5-desktop is-8-tablet">
        
        <div id="js-error-notify" class="notification is-danger" style="display: none; border-radius: 15px; margin-bottom: 1.5rem;">
            <button class="delete" type="button" onclick="this.parentElement.style.display='none'"></button>
            <span id="error-message"></span>
        </div>

        <div class="auth-card" style="background-color: var(--cream); border: 3px solid var(--border-dark); border-radius: 30px; padding: 3rem; margin-top: 1rem;">
            <h2 style="font-family: 'Georgia', serif; text-transform: uppercase; font-weight: bold; text-align: center; margin-bottom: 2rem;">Reset Password</h2>
            
            <form method="post" id="resetForm">
                
                <div class="field" style="margin-bottom: 1.5rem;">
                    <label class="label" for="email" style="font-size: 0.8rem; text-transform: uppercase;">Email Address</label>
                    <div class="control">
                        <input class="input" type="email" name="email" id="email" value="{{ email }}" required readonly style="border: 2px solid var(--border-dark); border-radius: 15px; background-color: #f5f5f5;">
                    </div>
                </div>
                
                <div class="field" style="margin-bottom: 1.5rem;">
                    <label class="label" for="code" style="font-size: 0.8rem; text-transform: uppercase;">6-Digit Reset Code</label>
                    <div class="control">
                        <input class="input" type="text" name="code" id="code" maxlength="6" pattern="\d{6}" placeholder="123456" required style="border: 2px solid var(--border-dark); border-radius: 15px; letter-spacing: 3px; font-weight: bold;">
                    </div>
                </div>
                
                <div class="field" style="margin-bottom: 1.5rem;">
                    <label class="label" for="password" style="font-size: 0.8rem; text-transform: uppercase;">New Password</label>
                    <div class="control">
                        <input class="input" type="password" name="password" id="password" required oninput="checkPasswordStrength()" style="border: 2px solid var(--border-dark); border-radius: 15px;">
                    </div>
                    
                    <progress class="progress is-danger is-small mt-2" id="strength-bar" value="0" max="100"></progress>
                    
                    <small style="font-size: 0.75rem; display: block; margin-top: 10px; line-height: 1.6;">
                        Must contain:<br>
                        • <span id="req-length" style="color: #ff3860;">8+ Characters</span><br>
                        • <span id="req-number" style="color: #ff3860;">1 Number</span><br>
                        • <span id="req-symbol" style="color: #ff3860;">1 Symbol</span><br>
                        • <span id="req-match" style="color: #ff3860;">Passwords Match</span>
                    </small>
                </div>
                
                <div class="field" style="margin-bottom: 1.5rem;">
                    <label class="label" for="confirm_password" style="font-size: 0.8rem; text-transform: uppercase;">Confirm New Password</label>
                    <div class="control">
                        <input class="input" type="password" name="confirm_password" id="confirm_password" required oninput="checkPasswordStrength()" style="border: 2px solid var(--border-dark); border-radius: 15px;">
                    </div>
                </div>

                <div class="field mt-5">
                    <div class="control has-text-centered">
                        <button type="submit" id="submit-btn" class="btn-pill is-fullwidth">Update Password</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
// Your JS Logic remains the same
function checkPasswordStrength() {
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirm_password').value;
    const bar = document.getElementById('strength-bar');
    
    let strength = 0;
    const hasLength = password.length >= 8;
    const hasNumber = /[0-9]/.test(password);
    const hasSymbol = /[!@#$%^&*(),.?:{}|<>]/.test(password);
    const matches = (password === confirm && password !== "");

    document.getElementById('req-length').style.color = hasLength ? "#23d160" : "#ff3860";
    document.getElementById('req-number').style.color = hasNumber ? "#23d160" : "#ff3860";
    document.getElementById('req-symbol').style.color = hasSymbol ? "#23d160" : "#ff3860";
    document.getElementById('req-match').style.color = matches ? "#23d160" : "#ff3860";

    if (hasLength) strength += 34;
    if (hasNumber) strength += 33;
    if (hasSymbol) strength += 33;
    bar.value = strength;

    if (strength < 40) bar.className = "progress is-danger is-small mt-2";
    else if (strength < 100) bar.className = "progress is-warning is-small mt-2";
    else bar.className = "progress is-success is-small mt-2";
}

document.getElementById('resetForm').onsubmit = function(e) {
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirm_password').value;
    const notify = document.getElementById('js-error-notify');
    const errorText = document.getElementById('error-message');

    const hasLength = password.length >= 8;
    const hasNumber = /[0-9]/.test(password);
    const hasSymbol = /[!@#$%^&*(),.?:{}|<>]/.test(password);
    const matches = (password === confirm && password !== "");

    if (!hasLength || !hasNumber || !hasSymbol || !matches) {
        e.preventDefault(); 
        notify.style.display = 'block'; 
        
        if (!matches) {
            errorText.innerText = "Error: Passwords do not match.";
        } else {
            errorText.innerText = "Error: Please meet all security requirements.";
        }
        
        window.scrollTo(0, 0); 
    }
};
</script>
{% endblock %}
