{% extends 'base.html' %}

{% block title %}Account Settings - Open Kitchen{% endblock %}

{% block content %}
<style>
    .auth-card {
        background-color: var(--cream);
        border: 3px solid var(--border-dark);
        border-radius: 30px;
        padding: 3rem 2rem;
        box-shadow: 10px 10px 0px var(--border-dark);
        margin-bottom: 2rem;
    }

    .auth-title {
        font-family: 'Georgia', serif;
        text-transform: uppercase;
        font-weight: bold;
        font-size: 2rem;
        letter-spacing: 2px;
        color: var(--border-dark);
    }

    .section-title {
        font-family: 'Georgia', serif;
        text-transform: uppercase;
        font-weight: bold;
        font-size: 1.5rem;
        letter-spacing: 2px;
        color: var(--border-dark);
        margin-bottom: 1.5rem;
    }

    .form-label {
        text-transform: uppercase;
        font-size: 0.75rem;
        font-weight: bold;
        letter-spacing: 1px;
        margin-bottom: 0.5rem;
        display: block;
    }

    .auth-input {
        width: 100%;
        padding: 12px;
        border-radius: 12px;
        border: 2px solid var(--border-dark);
        background-color: white;
        font-family: inherit;
        transition: border-color 0.2s;
    }

    .auth-input:focus {
        outline: none;
        border-color: var(--pill-green);
    }

    .auth-footer-text {
        font-size: 0.85rem;
        color: var(--border-dark);
        opacity: 0.8;
    }

    .auth-footer-text a {
        color: var(--forest-green);
        font-weight: bold;
        text-decoration: underline;
    }
</style>

<div class="columns is-centered mt-6">
    <div class="column is-10-mobile is-10-tablet is-8-desktop is-7-widescreen">
        <div class="auth-card">
            <h2 class="auth-title has-text-centered mb-6">Account Settings</h2>
            
            <!-- Update Profile -->
            <section class="mb-6">
                <h3 class="section-title">Profile Information</h3>
                <form method="post">
                    <input type="hidden" name="action" value="update_profile">
                    
                    <div class="field mb-4">
                        <label class="form-label" for="username">Username</label>
                        <div class="control">
                            <input class="auth-input" type="text" id="username" name="username"
                                   value="{{ g.user['username'] }}" required>
                        </div>
                    </div>

                    <div class="field mb-5">
                        <label class="form-label" for="email">Email</label>
                        <div class="control">
                            <input class="auth-input" type="email" id="email" name="email"
                                   value="{{ g.user['email'] }}" required>
                        </div>
                    </div>

                    <div class="field">
                        <div class="control">
                            <button type="submit" class="btn-pill" style="padding: 12px 30px;">
                                Save Changes
                            </button>
                        </div>
                    </div>
                </form>
            </section>

            <hr style="border: 0; border-top: 2px solid var(--border-dark); margin: 2rem 0;">

            <!-- Change Password -->
            <section>
                <h3 class="section-title">Change Password</h3>
                <form method="post">
                    <input type="hidden" name="action" value="change_password">
                    
                    <div class="field mb-4">
                        <label class="form-label" for="current_password">Current Password</label>
                        <div class="control">
                            <input class="auth-input" type="password" id="current_password" name="current_password" required>
                        </div>
                    </div>

                    <div class="field mb-4">
                        <label class="form-label" for="new_password">New Password</label>
                        <div class="control">
                            <input class="auth-input" type="password" id="new_password" name="new_password" required>
                        </div>
                    </div>

                    <div class="field mb-5">
                        <label class="form-label" for="confirm_password">Confirm New Password</label>
                        <div class="control">
                            <input class="auth-input" type="password" id="confirm_password" name="confirm_password" required>
                        </div>
                    </div>

                    <div class="field">
                        <div class="control">
                            <button type="submit" class="btn-pill" style="padding: 12px 30px;">
                                Change Password
                            </button>
                        </div>
                    </div>

                    <div class="has-text-centered mt-4">
                        <p class="auth-footer-text">
                            <a href="{{ url_for('auth.forgot_password') }}">Forgot your current password?</a>
                        </p>
                    </div>
                </form>
            </section>
        </div>
    </div>
</div>
{% endblock %}
