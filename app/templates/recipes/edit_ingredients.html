{% extends 'base.html' %}
{% block title %}Edit Ingredients{% endblock %}
{% block content %}
<div class="form-card" style="background-color: var(--cream); border: 3px solid var(--border-dark); border-radius: 30px; padding: 2rem;">
    <h1 style="font-family: 'Georgia', serif; text-transform: uppercase;">Edit Ingredients</h1>
    <form method="post" class="mt-4">
        <div style="display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 10px;">
            <input type="text" name="name" placeholder="INGREDIENT NAME" style="border: 2px solid var(--border-dark); border-radius: 15px; padding: 10px;" required>
            <input type="number" name="quantity" step="0.01" placeholder="QTY" style="border: 2px solid var(--border-dark); border-radius: 15px; padding: 10px;" required>
            <select name="unit_id" style="border: 2px solid var(--border-dark); border-radius: 15px; padding: 10px;" required>
                <option value="">UNIT</option>
                {% for unit in units %}<option value="{{ unit.id }}">{{ unit.name }}</option>{% endfor %}
            </select>
        </div>
        <button type="submit" style="margin-top: 1rem; background-color: var(--pill-green); border: 2px solid var(--border-dark); border-radius: 50px; padding: 10px 20px; font-weight: bold;">ADD INGREDIENT</button>
    </form>
</div>
{% endblock %}
