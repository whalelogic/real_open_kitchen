{% extends 'base.html' %}

{% block title %}Create Recipe - Open Kitchen{% endblock %}

{% block content %}
<style>
    .recipe-card {
        background-color: var(--cream);
        border: 3px solid var(--border-dark);
        border-radius: 30px;
        padding: 3rem;
        box-shadow: 10px 10px 0px var(--border-dark); /* Match the Auth style */
        margin-top: 3rem;
    }

    .recipe-title {
        font-family: 'Georgia', serif;
        text-transform: uppercase;
        font-weight: bold;
        font-size: 2rem;
        color: var(--border-dark);
        margin-bottom: 2rem;
    }

    .form-label {
        display: block;
        font-weight: bold;
        text-transform: uppercase;
        font-size: 0.8rem;
        letter-spacing: 1px;
        margin-bottom: 0.5rem;
    }

    .recipe-input, .recipe-textarea {
        width: 100%;
        border: 2px solid var(--border-dark);
        border-radius: 15px;
        padding: 12px;
        margin-bottom: 1.5rem;
        font-family: inherit;
        background-color: white;
    }

    .recipe-textarea {
        min-height: 100px;
        resize: vertical;
    }

    .recipe-input:focus, .recipe-textarea:focus {
        outline: none;
        border-color: var(--pill-green);
    }
</style>

<div class="columns is-centered">
    <div class="column is-7-desktop is-9-tablet">
        <div class="recipe-card">
            <h1 class="recipe-title has-text-centered">Create New Recipe</h1>
            
            <form method="post">
                <input type="hidden" name="template_type" value="create_recipe">

                <div class="field">
                    <label class="form-label" for="title">Recipe Title</label>
                    <input class="recipe-input" type="text" name="title" id="title" placeholder="e.g., Sunday Gravy" required>
                </div>

                <div class="field">
                    <label class="form-label" for="description">Description</label>
                    <textarea class="recipe-textarea" name="description" id="description" placeholder="Share a little bit about this dish..."></textarea>
                </div>

                <div class="has-text-centered mt-4">
                    <button type="submit" class="btn-pill" style="width: 100%; cursor: pointer;">
                        SAVE AND ADD INGREDIENTS
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
